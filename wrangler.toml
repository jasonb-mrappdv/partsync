name = "partsync"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "partsync"
database_id = "1643aae7-e4f8-44b1-a1dc-b8e339849487"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "partsync-uploads"

[[kv_namespaces]]
binding = "SESSIONS"
id = "664a6ea0b1ac49f39842c0fd52070e15"

[vars]
APP_ENV = "production"
# PUBLIC_BUCKET_URL is the URL pattern for public-read R2 objects, e.g.
# "https://pub-xxxx.r2.dev" or a custom domain attached to the bucket.
PUBLIC_BUCKET_URL = "https://REPLACE_ME.r2.dev"

# Secrets (set with `wrangler pages secret put NAME`):
#   JWT_SECRET           — long random string for signing session JWTs
#   RESEND_API_KEY       — API key from resend.com
#   RESEND_FROM          — verified "from" address, e.g. "PartSync <noreply@yourdomain.com>"
